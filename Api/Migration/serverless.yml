service: Users-pn

plugins:
  - serverless-offline

provider:
  name: aws
  runtime: nodejs10.x
  stage: ${opt:stage, 'test'}
  region: us-east-1
  environment:
    STAGE: ${self:provider.stage}
    DB_HOST: ${file(../../commons/credentials.json):${self:provider.stage}.dbHost}
    DB_PORT: ${file(../../commons/credentials.json):${self:provider.stage}.dbPort}
    DB_PASSWORD: ${file(../../commons/credentials.json):${self:provider.stage}.dbPassword}
    DB_USER: ${file(../../commons/credentials.json):${self:provider.stage}.dbUser}
    DB_NAME: ${file(../../commons/credentials.json):${self:provider.stage}.dbName}   

package:
  include:
    - ../../commons/**
  exclude:
    - node_modules/**


functions:
  fixIds:
    handler: handler.fixIds
    timeout: 30
    events:
      - http:
          path: fixIds
          method: get
          cors:
           origin: '*'
           allowCredentials: true
           headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
  
  migrateUsers:
    handler: handler.migrateUsers
    timeout: 30
    events:
      - http:
          path: migrateUsers
          method: get
          cors:
           origin: '*'
           allowCredentials: true
           headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent            
  

